  AML.CS0009:
    name: Tay Poisoning
    description: Microsoft created Tay, a twitter chatbot for 18 to 24 year-olds in
      the U.S. for entertainment purposes. Within 24 hours of its deployment, Tay
      had to be decommissioned because it tweeted reprehensible words.
