    object-type: case-study
  AML.CS0007:
    name: GPT-2 Model Replication
    description: OpenAI built GPT-2, a powerful natural language model and adopted
      a staged-release process to incrementally release 1.5 Billion parameter model.
      Before the 1.5B parameter model could be released by OpenAI eventually, two
      ML researchers replicated the model and released it to the public.
    references: []
