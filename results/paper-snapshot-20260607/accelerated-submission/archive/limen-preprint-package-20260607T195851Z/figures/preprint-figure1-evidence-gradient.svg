<text x="745" y="175" class="head" text-anchor="start">Log scale</text>
<line x1="90" y1="200" x2="1600" y2="200" stroke="#111111" stroke-width="4"/>
<line x1="90" y1="252" x2="1600" y2="252" stroke="#e1e5ea" stroke-width="2"/>
