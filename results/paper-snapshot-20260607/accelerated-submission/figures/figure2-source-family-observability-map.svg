<rect x="650" y="563" width="800" height="36" rx="8" fill="#edf1f7"/>
<rect x="650" y="563" width="100" height="36" rx="8" fill="#188b5b"/>
<text x="772" y="593" class="number">1</text>
<text x="60" y="725" class="section">Extra anchors kept outside the main count</text>
<text x="80" y="811" class="label">Research-integrity and publisher notices</text>
<rect x="650" y="780" width="800" height="36" rx="8" fill="#edf1f7"/>
<rect x="650" y="780" width="200" height="36" rx="8" fill="#667085"/>
<text x="872" y="810" class="number">2</text>
