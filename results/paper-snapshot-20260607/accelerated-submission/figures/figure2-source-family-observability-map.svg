<rect width="1800" height="1180" fill="#ffffff"/>
<text x="60" y="70" class="title">Figure 2. What kind of public evidence is visible?</text>
<text x="60" y="108" class="subtitle">The paper separates the main set from extra anchors instead of mixing everything into one count.</text>
<text x="60" y="180" class="section">Main paper set</text>
<text x="80" y="266" class="label">Regulators and enforcement agencies</text>
<rect x="650" y="235" width="800" height="36" rx="8" fill="#edf1f7"/>
<rect x="650" y="235" width="600" height="36" rx="8" fill="#2166ac"/>
<text x="1272" y="265" class="number">6</text>
<text x="80" y="348" class="label">Courts and tribunal records</text>
<rect x="650" y="317" width="800" height="36" rx="8" fill="#edf1f7"/>
<rect x="650" y="317" width="100" height="36" rx="8" fill="#087f8c"/>
<text x="772" y="347" class="number">1</text>
