<rect x="650" y="944" width="800" height="36" rx="8" fill="#edf1f7"/>
<rect x="650" y="944" width="100" height="36" rx="8" fill="#667085"/>
<text x="772" y="974" class="number">1</text>
<text x="60" y="1110" class="tiny">Read this as a map of observability, not a map of how often artificial intelligence failures happen.</text>
