<rect x="990" y="560" width="500" height="56" rx="0" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="1018" y="597" class="label" text-anchor="start">Duplicate state</text>
<rect x="990" y="656" width="500" height="56" rx="0" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="1018" y="693" class="label" text-anchor="start">Claim limit</text>
<text x="150" y="820" class="small" text-anchor="start">Complete workflow records improve auditability.</text>
