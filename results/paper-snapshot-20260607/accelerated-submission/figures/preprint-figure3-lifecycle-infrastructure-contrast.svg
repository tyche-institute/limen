<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="880" viewBox="0 0 1700 880">
<defs>
<style>
text{font-family:Arial,Helvetica,sans-serif;fill:#111111}
.title{font-size:58px;font-weight:700}
.subtitle{font-size:34px;fill:#4b5563}
.head{font-size:36px;font-weight:700}
.label{font-size:32px}
.small{font-size:28px;fill:#4b5563}
.tiny{font-size:24px;fill:#4b5563}
.num{font-size:52px;font-weight:700}
.huge{font-size:78px;font-weight:700}
</style>
</defs>
<rect width="1700" height="880" fill="#ffffff"/>
<text x="70" y="82" class="title">Workflow infrastructure versus event evidence</text>
<text x="70" y="132" class="subtitle">Process receipts and event claims are separate axes.</text>
<text x="150" y="205" class="head" text-anchor="start">Workflow receipts</text>
<text x="1010" y="205" class="head" text-anchor="start">Evidence controls</text>
<line x1="110" y1="235" x2="735" y2="235" stroke="#111111" stroke-width="4"/>
<line x1="970" y1="235" x2="1545" y2="235" stroke="#111111" stroke-width="4"/>
<circle cx="160" cy="300" r="15" fill="#174a7c"/>
<text x="205" y="310" class="label" text-anchor="start">Observed</text>
