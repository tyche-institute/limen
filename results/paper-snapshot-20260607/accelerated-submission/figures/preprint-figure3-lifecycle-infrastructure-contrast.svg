<circle cx="160" cy="604" r="15" fill="#174a7c"/>
<text x="205" y="614" class="label" text-anchor="start">Clustered</text>
<line x1="160" y1="622" x2="160" y2="659" stroke="#b8c0cc" stroke-width="3"/>
<circle cx="160" cy="680" r="15" fill="#174a7c"/>
<text x="205" y="690" class="label" text-anchor="start">Published</text>
<line x1="160" y1="698" x2="160" y2="735" stroke="#b8c0cc" stroke-width="3"/>
<circle cx="160" cy="756" r="15" fill="#174a7c"/>
<text x="205" y="766" class="label" text-anchor="start">Superseded</text>
<rect x="990" y="272" width="500" height="56" rx="0" fill="#ffffff" stroke="#111111" stroke-width="2"/>
