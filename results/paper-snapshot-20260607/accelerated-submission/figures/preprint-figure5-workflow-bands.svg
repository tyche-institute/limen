<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="900" viewBox="0 0 1700 900">
<defs>
<style>
text{font-family:Arial,Helvetica,sans-serif;fill:#111111}
.title{font-size:58px;font-weight:700}
.subtitle{font-size:34px;fill:#4b5563}
.head{font-size:36px;font-weight:700}
.label{font-size:32px}
.small{font-size:28px;fill:#4b5563}
.tiny{font-size:24px;fill:#4b5563}
.num{font-size:52px;font-weight:700}
.huge{font-size:78px;font-weight:700}
</style>
</defs>
<rect width="1700" height="900" fill="#ffffff"/>
<text x="70" y="82" class="title">Full-scale observatory operation</text>
<text x="70" y="132" class="subtitle">The paper core stays fixed while the observatory continues to move.</text>
<rect x="95" y="230" width="420" height="210" rx="0" fill="#ffffff" stroke="#111111" stroke-width="3"/>
<text x="125" y="285" class="head" text-anchor="start">Keep stable</text>
<text x="125" y="335" class="label" text-anchor="start">Reviewed core</text>
<text x="125" y="405" class="huge" text-anchor="start">21</text>
<rect x="610" y="230" width="420" height="210" rx="0" fill="#ffffff" stroke="#111111" stroke-width="3"/>
<text x="640" y="285" class="head" text-anchor="start">Promote carefully</text>
<text x="640" y="335" class="label" text-anchor="start">Candidate leads</text>
<text x="640" y="405" class="huge" text-anchor="start">7</text>
<rect x="1125" y="230" width="420" height="210" rx="0" fill="#ffffff" stroke="#111111" stroke-width="3"/>
<text x="1155" y="285" class="head" text-anchor="start">Use as context</text>
<text x="1155" y="335" class="label" text-anchor="start">Side anchors</text>
<text x="1155" y="405" class="huge" text-anchor="start">7</text>
<rect x="95" y="545" width="420" height="210" rx="0" fill="#ffffff" stroke="#111111" stroke-width="3"/>
<text x="125" y="600" class="head" text-anchor="start">Check access</text>
<text x="125" y="650" class="label" text-anchor="start">Public links</text>
<text x="125" y="720" class="huge" text-anchor="start">156</text>
<rect x="610" y="545" width="420" height="210" rx="0" fill="#ffffff" stroke="#111111" stroke-width="3"/>
<text x="640" y="600" class="head" text-anchor="start">Triage</text>
<text x="640" y="650" class="label" text-anchor="start">Discovery signals</text>
<text x="640" y="720" class="huge" text-anchor="start">57,603</text>
<rect x="1125" y="545" width="420" height="210" rx="0" fill="#ffffff" stroke="#111111" stroke-width="3"/>
<text x="1155" y="600" class="head" text-anchor="start">Hold</text>
<text x="1155" y="650" class="label" text-anchor="start">Document pending</text>
<text x="1155" y="720" class="huge" text-anchor="start">2</text>
<line x1="515" y1="335" x2="610" y2="335" stroke="#b8c0cc" stroke-width="5"/>
<line x1="1030" y1="335" x2="1125" y2="335" stroke="#b8c0cc" stroke-width="5"/>
<line x1="515" y1="650" x2="610" y2="650" stroke="#b8c0cc" stroke-width="5"/>
<line x1="1030" y1="650" x2="1125" y2="650" stroke="#b8c0cc" stroke-width="5"/>
<text x="95" y="835" class="small" text-anchor="start">Operating rule: growth happens outside the locked reviewed-core denominator.</text>
</svg>
